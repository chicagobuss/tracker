# CI: format/vet/build/test on every push and PR; on main and version tags,
# additionally build the Docker image (VERSION stamped from git describe, same
# as the Makefile) and push it to GHCR for pull-based deploys.
name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git describe --tags works
      - name: version
        id: version
        run: echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: login to ghcr
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      - name: build (and push on main/tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: VERSION=${{ steps.version.outputs.version }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
