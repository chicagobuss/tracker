# Pinned project name so the stack is recognized regardless of directory
# (matches the existing coord-postgres container + coord_pgdata volume).
name: coord

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: coord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-coord}
      POSTGRES_PASSWORD: ${PGPASSWORD:-coord}
      POSTGRES_DB: ${PGDATABASE:-coord}
    # Loopback only: the host-networked tracker reaches Postgres via 127.0.0.1.
    # To expose it on another interface (e.g. your ZeroTier IP), add the bind in
    # a compose.override.yml — a hardcoded IP here breaks any host that lacks it.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-coord} -d ${PGDATABASE:-coord}"]
      interval: 5s
      timeout: 3s
      retries: 10

  tracker:
    build:
      context: .
      args:
        VERSION: ${TRACKER_VERSION:-dev}
    image: tracker:local
    container_name: coord-tracker
    restart: unless-stopped
    # Host networking: binds the same loopback/LAN/ZeroTier IPs as before and
    # reaches Postgres (127.0.0.1:5432) and RustFS (192.168.1.100:9000) on the host.
    network_mode: host
    env_file: .env
    volumes:
      # If STORAGE_TYPE=file, map the host's ./data/blobs into the container so
      # the flat files persist across restarts. The container target must be
      # absolute; the binary's workdir is /, so BLOB_DIR=./data/blobs resolves
      # to /data/blobs and matches this mount.
      - ./data/blobs:/data/blobs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
