# Pinned project name so the stack is recognized regardless of directory
# (matches the existing coord-postgres container + coord_pgdata volume).
name: coord

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: coord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-coord}
      POSTGRES_PASSWORD: ${PGPASSWORD:-coord}
      POSTGRES_DB: ${PGDATABASE:-coord}
    # Bind to ZeroTier + localhost only (never the public/LAN interface by default).
    ports:
      - "127.0.0.1:5432:5432"
      - "10.10.10.10:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-coord} -d ${PGDATABASE:-coord}"]
      interval: 5s
      timeout: 3s
      retries: 10

  tracker:
    build: .
    image: tracker:local
    container_name: coord-tracker
    restart: unless-stopped
    # Host networking: binds the same loopback/LAN/ZeroTier IPs as before and
    # reaches Postgres (127.0.0.1:5432) and RustFS (192.168.1.100:9000) on the host.
    network_mode: host
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
